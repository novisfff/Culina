services:
  mysql:
    image: mysql:8.4
    container_name: culina-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: culina_local_root
      MYSQL_DATABASE: culina
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "3306:3306"
    volumes:
      - culina_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pculina_local_root"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  culina_mysql_data:
