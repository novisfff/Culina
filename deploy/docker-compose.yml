name: culina

services:
  mysql:
    image: mysql:8.4
    container_name: culina-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-culina_local_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-culina}
      MYSQL_USER: ${MYSQL_USER:-culina}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-culina_local_password}
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - culina_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2023-11-06T22-26-08Z
    container_name: culina-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-culina}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-culina_local_minio_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - culina_minio_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: culina-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - culina_qdrant_data:/qdrant/storage

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    container_name: culina-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-culina}
      MYSQL_USER: ${MYSQL_USER:-culina}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-culina_local_password}
      JWT_SECRET: ${JWT_SECRET:-culina-local-dev-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      MEDIA_MAX_UPLOAD_BYTES: ${MEDIA_MAX_UPLOAD_BYTES:-31457280}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-culina}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-culina_local_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-culina-media}
      MINIO_SECURE: "false"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_API_BASE: ${AI_API_BASE:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_SUPPORTS_VISION: ${AI_SUPPORTS_VISION:-true}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-180}
      AI_PROMPT_CACHE_ENABLED: ${AI_PROMPT_CACHE_ENABLED:-true}
      AI_TRACE_ENABLED: ${AI_TRACE_ENABLED:-true}
      AI_TRACE_CAPTURE_LLM_EXCHANGES: ${AI_TRACE_CAPTURE_LLM_EXCHANGES:-false}
      AI_TRACE_CAPTURE_MESSAGE_CONTENT: ${AI_TRACE_CAPTURE_MESSAGE_CONTENT:-false}
      AI_TRACE_CAPTURE_STREAM_CHUNKS: ${AI_TRACE_CAPTURE_STREAM_CHUNKS:-false}
      AI_TRACE_CAPTURE_IMAGE_BYTES: ${AI_TRACE_CAPTURE_IMAGE_BYTES:-false}
      AI_TRACE_PAYLOAD_MODE: ${AI_TRACE_PAYLOAD_MODE:-redacted}
      AI_TRACE_RETENTION_DAYS: ${AI_TRACE_RETENTION_DAYS:-7}
      AI_TRACE_MAX_REQUEST_BYTES: ${AI_TRACE_MAX_REQUEST_BYTES:-1048576}
      AI_TRACE_MAX_RESPONSE_BYTES: ${AI_TRACE_MAX_RESPONSE_BYTES:-1048576}
      AI_IMAGE_REFERENCE_PROVIDER: ${AI_IMAGE_REFERENCE_PROVIDER:-disabled}
      AI_IMAGE_REFERENCE_API_BASE: ${AI_IMAGE_REFERENCE_API_BASE:-https://dashscope.aliyuncs.com/api/v1}
      AI_IMAGE_REFERENCE_API_KEY: ${AI_IMAGE_REFERENCE_API_KEY:-}
      AI_IMAGE_REFERENCE_MODEL: ${AI_IMAGE_REFERENCE_MODEL:-wan2.6-image}
      AI_IMAGE_TEXT_PROVIDER: ${AI_IMAGE_TEXT_PROVIDER:-disabled}
      AI_IMAGE_TEXT_API_BASE: ${AI_IMAGE_TEXT_API_BASE:-https://dashscope.aliyuncs.com/api/v1}
      AI_IMAGE_TEXT_API_KEY: ${AI_IMAGE_TEXT_API_KEY:-}
      AI_IMAGE_TEXT_MODEL: ${AI_IMAGE_TEXT_MODEL:-wan2.6-t2i}
      AI_AUDIO_ENABLED: ${AI_AUDIO_ENABLED:-false}
      AI_STT_PROVIDER: ${AI_STT_PROVIDER:-disabled}
      AI_STT_API_BASE: ${AI_STT_API_BASE:-}
      AI_STT_API_KEY: ${AI_STT_API_KEY:-}
      AI_STT_MODEL: ${AI_STT_MODEL:-}
      AI_STT_LANGUAGE_HINT: ${AI_STT_LANGUAGE_HINT:-zh}
      AI_STT_AUDIO_FORMAT: ${AI_STT_AUDIO_FORMAT:-auto}
      AI_STT_SAMPLE_RATE: ${AI_STT_SAMPLE_RATE:-16000}
      AI_STT_HOTWORDS: ${AI_STT_HOTWORDS:-}
      AI_STT_TIMEOUT_SECONDS: ${AI_STT_TIMEOUT_SECONDS:-45}
      AI_STT_MAX_UPLOAD_BYTES: ${AI_STT_MAX_UPLOAD_BYTES:-10485760}
      AI_STT_MAX_DURATION_SECONDS: ${AI_STT_MAX_DURATION_SECONDS:-60}
      AI_TTS_PROVIDER: ${AI_TTS_PROVIDER:-disabled}
      AI_TTS_API_BASE: ${AI_TTS_API_BASE:-}
      AI_TTS_API_KEY: ${AI_TTS_API_KEY:-}
      AI_TTS_MODEL: ${AI_TTS_MODEL:-}
      AI_TTS_VOICE: ${AI_TTS_VOICE:-}
      AI_TTS_FORMAT: ${AI_TTS_FORMAT:-mp3}
      AI_TTS_SAMPLE_RATE: ${AI_TTS_SAMPLE_RATE:-24000}
      AI_TTS_LANGUAGE_TYPE: ${AI_TTS_LANGUAGE_TYPE:-Chinese}
      AI_TTS_STREAMING: ${AI_TTS_STREAMING:-false}
      AI_TTS_TIMEOUT_SECONDS: ${AI_TTS_TIMEOUT_SECONDS:-45}
      AI_REALTIME_PROVIDER: ${AI_REALTIME_PROVIDER:-disabled}
      AI_REALTIME_API_BASE: ${AI_REALTIME_API_BASE:-}
      AI_REALTIME_API_KEY: ${AI_REALTIME_API_KEY:-}
      AI_REALTIME_MODEL: ${AI_REALTIME_MODEL:-}
      AI_REALTIME_VOICE: ${AI_REALTIME_VOICE:-}
      AI_REALTIME_AUDIO_FORMAT: ${AI_REALTIME_AUDIO_FORMAT:-pcm}
      AI_REALTIME_INPUT_SAMPLE_RATE: ${AI_REALTIME_INPUT_SAMPLE_RATE:-16000}
      AI_REALTIME_OUTPUT_SAMPLE_RATE: ${AI_REALTIME_OUTPUT_SAMPLE_RATE:-24000}
      AI_REALTIME_VAD_SILENCE_MS: ${AI_REALTIME_VAD_SILENCE_MS:-400}
      AI_REALTIME_TIMEOUT_SECONDS: ${AI_REALTIME_TIMEOUT_SECONDS:-300}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_WORKSPACE_ID: ${DASHSCOPE_WORKSPACE_ID:-}
      DASHSCOPE_REGION: ${DASHSCOPE_REGION:-cn-beijing}
      DASHSCOPE_HTTP_API_BASE: ${DASHSCOPE_HTTP_API_BASE:-}
      DASHSCOPE_WEBSOCKET_API_BASE: ${DASHSCOPE_WEBSOCKET_API_BASE:-}
      SEARCH_HYBRID_ENABLED: ${SEARCH_HYBRID_ENABLED:-true}
      SEARCH_KEYWORD_BACKEND: mysql
      SEARCH_VECTOR_BACKEND: qdrant
      SEARCH_EMBEDDING_PROVIDER: ${SEARCH_EMBEDDING_PROVIDER:-disabled}
      SEARCH_EMBEDDING_API_BASE: ${SEARCH_EMBEDDING_API_BASE:-}
      SEARCH_EMBEDDING_API_KEY: ${SEARCH_EMBEDDING_API_KEY:-}
      SEARCH_EMBEDDING_MODEL: ${SEARCH_EMBEDDING_MODEL:-}
      SEARCH_EMBEDDING_DIMENSIONS: ${SEARCH_EMBEDDING_DIMENSIONS:-0}
      SEARCH_EMBEDDING_TIMEOUT_SECONDS: ${SEARCH_EMBEDDING_TIMEOUT_SECONDS:-30}
      SEARCH_RERANK_PROVIDER: ${SEARCH_RERANK_PROVIDER:-disabled}
      SEARCH_RERANK_API_BASE: ${SEARCH_RERANK_API_BASE:-}
      SEARCH_RERANK_API_KEY: ${SEARCH_RERANK_API_KEY:-}
      SEARCH_RERANK_MODEL: ${SEARCH_RERANK_MODEL:-}
      SEARCH_RERANK_TIMEOUT_SECONDS: ${SEARCH_RERANK_TIMEOUT_SECONDS:-10}
      SEARCH_RERANK_INSTRUCT: "${SEARCH_RERANK_INSTRUCT:-你是中文厨房搜索结果重排器。目标是找出与查询词最直接匹配的食材、食物或菜谱。短查询优先按字面匹配排序：名称完全相同 > 名称、别名或关键词包含查询词 > 语义相关但未字面命中 > 无关、测试或占位数据。不要因为分类、详情或语义描述泛泛相关，就把未字面命中的记录排到字面命中记录前面。}"
      SEARCH_RERANK_SEMANTIC_MIN_SCORE: ${SEARCH_RERANK_SEMANTIC_MIN_SCORE:-0.48}
      SEARCH_RERANK_MIN_SCORE: ${SEARCH_RERANK_MIN_SCORE:-0.58}
      SEARCH_LITERAL_FALLBACK_MIN_SCORE: ${SEARCH_LITERAL_FALLBACK_MIN_SCORE:-0.70}
      SEARCH_RERANK_CANDIDATE_LIMIT: ${SEARCH_RERANK_CANDIDATE_LIMIT:-50}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-culina_search}
      QDRANT_TIMEOUT_SECONDS: ${QDRANT_TIMEOUT_SECONDS:-10}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-CulinaAdmin123!}
      INITIAL_ADMIN_DISPLAY_NAME: ${INITIAL_ADMIN_DISPLAY_NAME:-家庭管理员}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PHONE: ${INITIAL_ADMIN_PHONE:-}
      INITIAL_FAMILY_NAME: ${INITIAL_FAMILY_NAME:-Culina 家庭厨房}
      INITIAL_FAMILY_MOTTO: ${INITIAL_FAMILY_MOTTO:-}
      INITIAL_FAMILY_LOCATION: ${INITIAL_FAMILY_LOCATION:-}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: culina-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MINIO_BUCKET: ${MINIO_BUCKET:-culina-media}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  culina_mysql_data:
  culina_minio_data:
  culina_qdrant_data:
