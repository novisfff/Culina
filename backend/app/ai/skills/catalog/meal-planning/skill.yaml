version: 3
key: meal_plan
display_name: 餐食安排
intent: meal_plan
agent_key: meal_plan_agent
context_policy:
- inventory
- meal_logs
- foods
- recipes
- meal_plan
allowed_tools:
- inventory.read_expiring_items
- inventory.read_available_items
- human.request_input
- workspace.read_artifact
- meal_log.read_recent
- food.search
- food.read_by_id
- recipe.search
- recipe.read_by_id
- meal_plan.read_existing
- meal_plan.read_by_id
- meal_plan.recommend_today
- meal_plan.create_draft
script_files:
- scripts/expand_meal_slots.py
- scripts/validate_meal_plan.py
- scripts/render_plan_preview.py
output_types:
- today_recommendation
draft_types:
- meal_plan
draft_contract:
  meal_plan:
    schema_version: meal_plan.v1
    approval_config_key: meal_plan
    commit_handler_key: meal_plan
route_hints:
- meal_plan
- meal_planning
- today_recommendation
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 28
  max_same_read_calls: 2
completion_policy:
  terminal_tools:
    meal_plan.recommend_today: 即时餐食推荐卡可作为今日推荐模式的终态输出。
  followup_required_tools:
    inventory.read_expiring_items: 临期库存读取后必须说明计划影响、请求补充信息，或生成 meal_plan 草稿。
    inventory.read_available_items: 可用库存读取后必须说明可安排方向、请求补充信息，或生成推荐/计划草稿。
    meal_log.read_recent: 近期用餐读取后必须说明避重/偏好依据、请求补充信息，或生成 meal_plan 草稿。
    food.search: 食物检索后必须说明候选、请求用户选择，或生成 meal_plan 草稿。
    food.read_by_id: 读取食物资料后必须说明如何用于计划、请求补充信息，或生成 meal_plan 草稿。
    recipe.search: 菜谱检索后必须说明候选、请求用户选择，或生成 meal_plan 草稿。
    recipe.read_by_id: 读取菜谱后必须说明如何安排、请求补充信息，或生成 meal_plan 草稿。
    meal_plan.read_existing: 读取已有计划后必须总结冲突/空档、请求补充信息，或生成 meal_plan 草稿。
    meal_plan.read_by_id: 读取计划详情后必须说明可调整项、请求补充信息，或生成 meal_plan 草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或生成/调整 meal_plan 草稿。
    script.expand_meal_slots: 日期餐别展开后必须继续说明展开结果、请求补充信息，或生成 meal_plan 草稿。
    script.validate_meal_plan: 餐食计划校验后必须继续修正问题、请求补充信息，或调用 meal_plan.create_draft。
    script.render_plan_preview: 计划预览生成后必须继续向用户说明预览内容、请求补充信息，或调用 meal_plan.create_draft。
examples:
- 今晚吃什么？
- 今天用现有食材推荐一下。
- 安排三天晚餐。
- 第二天不要鸡肉。
- 明天早餐和晚餐帮我排一下。
- 把周五晚餐改成番茄炒蛋。
- 删除明天午餐计划。
- 这周末午晚餐都安排清淡一点。
routing:
  modes: [query, create, update]
  include_examples:
  - 今晚吃什么？
  - 今天用现有食材推荐一下。
  - 安排三天晚餐。
  - 第二天不要鸡肉。
  - 明天早餐和晚餐帮我排一下。
  - 把周五晚餐改成番茄炒蛋。
  - 删除明天午餐计划。
  - 这周末午晚餐都安排清淡一点。
  exclude_examples:
  - 记录昨晚吃了番茄炒蛋。
  - 新增盒装牛奶食物资料。
  - 按今晚计划正式做番茄炒蛋并扣库存。
  conflict_rules:
  - with: meal_log
    when: 用户描述的是已经吃过的一餐
    route_to: meal_log
  - with: recipe_cook
    when: 用户要执行计划中的菜并产生库存扣减
    route_to: recipe_cook
handoffs:
  missing_food:
    target_skill: food_profile
    required_draft_type: food_profile
    resume_skill: meal_plan
    state_schema: meal_missing_food.v1
attachment_policy:
  accepted_kinds: []
  usages: []
  bindable_fields: []
  current_message_only: true
  explicit_user_intent_required: true
