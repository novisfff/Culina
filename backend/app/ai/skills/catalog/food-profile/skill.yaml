version: 2
key: food_profile
display_name: 食物资料整理
intent: food_profile
agent_key: food_profile_agent
context_policy:
- foods
allowed_tools:
- food.search
- food.read_by_id
- human.request_input
- workspace.read_artifact
- food_profile.create_draft
script_files: []
output_types: []
draft_types:
- food_profile
draft_contract:
  food_profile:
    schema_version: food_profile.v1
    approval_config_key: food_profile
    commit_handler_key: food_profile
route_hints:
- food
- food_profile
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 10
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    food.search: 食物检索后必须说明候选、请求用户选择，或生成 food_profile 草稿。
    food.read_by_id: 读取食物资料后必须总结现有资料、请求补充信息，或生成更新草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或生成/调整 food_profile 草稿。
examples:
- 新增食物资料：盒装牛奶，类型成品，适合早餐。
- 整理蓝莓酸奶的食物资料。
- 把盒装牛奶改成适合早餐并收藏。
- 取消收藏这个食物。
- 查询蓝莓酸奶的食物资料。
