version: 3
key: recipe_cook
display_name: 按菜谱做菜
intent: recipe_cook
agent_key: recipe_cook_agent
context_policy:
- recipes
- inventory
- meal_plan
allowed_tools:
- family.read_context
- human.request_input
- workspace.read_artifact
- recipe.search
- recipe.read_by_id
- recipe.preview_cook
- recipe.create_cook_draft
- inventory.read_available_items
- meal_plan.read_existing
script_files: []
output_types:
- recipe_shortage
draft_types:
- recipe_cook
draft_contract:
  recipe_cook:
    schema_version: recipe_cook_operation.v2
    approval_config_key: recipe_cook
    commit_handler_key: recipe_cook
route_hints:
- recipe_cook
- cook_recipe
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 12
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    family.read_context: 读取家庭饮食偏好后必须继续结合当前任务预览做菜、请求补充信息或生成做菜草稿。
    recipe.search: 菜谱检索后必须说明候选、请求用户选择，或继续读取/预览做菜。
    recipe.read_by_id: 读取菜谱后必须说明可做性、请求补充信息，或调用 recipe.preview_cook。
    recipe.preview_cook: 预览后必须继续说明缺料、请求补充信息，或在库存充足时生成 recipe_cook 草稿。
    inventory.read_available_items: 可用库存读取后必须说明库存是否足够、请求补充信息，或继续预览/生成 recipe_cook 草稿。
    meal_plan.read_existing: 读取已有计划后必须说明匹配的计划项、请求补充信息，或继续预览/生成 recipe_cook 草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或继续做菜确认流程。
examples:
- 做一份番茄炒蛋，顺便扣减库存。
- 今晚按这个菜谱做 3 份。
- 把明天晚餐那条番茄炒蛋计划做掉。
- 预览一下红烧牛肉做 2 人份够不够。
- 按今晚计划做番茄炒蛋并记录餐食。
- 这道菜库存够的话帮我生成做菜确认。
routing:
  modes: [preview, execute]
  include_examples:
  - 做一份番茄炒蛋，顺便扣减库存。
  - 今晚按这个菜谱做 3 份。
  - 把明天晚餐那条番茄炒蛋计划做掉。
  - 预览一下红烧牛肉做 2 人份够不够。
  - 按今晚计划做番茄炒蛋并记录餐食。
  - 这道菜库存够的话帮我生成做菜确认。
  exclude_examples:
  - 帮我创建一份番茄炒蛋菜谱。
  - 这一步要煎到什么程度？
  - 安排明天晚餐吃番茄炒蛋。
  conflict_rules:
  - with: cooking_assistant
    when: 用户正在做菜页内问步骤或控制页面计时器
    route_to: cooking_assistant
  - with: recipe_draft
    when: 用户要创建或修改菜谱本身
    route_to: recipe_draft
handoffs:
  recipe_shortage:
    target_skill: shopping_list
    required_draft_type: shopping_list
    resume_skill: shopping_list
    state_schema: recipe_shortage_to_shopping.v1
attachment_policy:
  accepted_kinds: []
  usages: []
  bindable_fields: []
  current_message_only: true
  explicit_user_intent_required: true
