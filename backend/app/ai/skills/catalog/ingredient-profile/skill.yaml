version: 3
key: ingredient_profile
display_name: 食材档案整理
intent: ingredient_profile
agent_key: ingredient_profile_agent
context_policy:
- ingredients
allowed_tools:
- ingredient.search
- ingredient.read_by_id
- human.request_input
- workspace.read_artifact
- ingredient_profile.create_draft
script_files: []
output_types: []
draft_types:
- ingredient_profile
draft_contract:
  ingredient_profile:
    schema_version: ingredient_profile.v1
    approval_config_key: ingredient_profile
    commit_handler_key: ingredient_profile
route_hints:
- ingredient
- ingredient_profile
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 18
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    ingredient.search: 食材检索后必须说明候选、请求用户选择，或生成 ingredient_profile 草稿。
    ingredient.read_by_id: 读取食材档案后必须总结现有资料、请求补充信息，或生成更新草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或生成/调整 ingredient_profile 草稿。
examples:
- 新增鸡胸肉食材，默认单位克，冷冻保存。
- 把番茄默认保质期改成 7 天。
- 查询鸡蛋支持哪些单位。
- 把刚才鸡胸肉 1 袋等于 500 克保存成副单位。
- 设置牛奶低库存提醒为 2 盒。
routing:
  modes: [query, create, update]
  include_examples:
  - 新增鸡胸肉食材，默认单位克，冷冻保存。
  - 把番茄默认保质期改成 7 天。
  - 查询鸡蛋支持哪些单位。
  - 把刚才鸡胸肉 1 袋等于 500 克保存成副单位。
  - 设置牛奶低库存提醒为 2 盒。
  exclude_examples:
  - 鸡蛋入库 12 个，冷藏。
  - 新增盒装牛奶食物资料。
  - 把牛奶加入购物清单。
  conflict_rules:
  - with: inventory_analysis
    when: 用户操作的是已有食材的库存批次数量
    route_to: inventory_analysis
  - with: food_profile
    when: 用户管理的是成品、速食、包装食品或外卖资料
    route_to: food_profile
handoffs: {}
attachment_policy:
  accepted_kinds: [image]
  usages: [draft_media_binding, image_generation_reference]
  bindable_fields: [media_ids]
  current_message_only: true
  explicit_user_intent_required: true
