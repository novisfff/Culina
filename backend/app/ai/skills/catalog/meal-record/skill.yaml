version: 2
key: meal_log
display_name: 用餐记录
intent: meal_log
agent_key: meal_log_agent
context_policy:
- foods
- meal_logs
allowed_tools:
- food.search
- human.request_input
- workspace.read_artifact
- meal_log.read_recent
- meal_log.read_by_id
- meal_log.create_draft
script_files: []
output_types: []
draft_types:
- meal_log
draft_contract:
  meal_log:
    schema_version: meal_log.v1
    approval_config_key: meal_log
    commit_handler_key: meal_log
route_hints:
- meal_log
- meal_record
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 10
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    food.search: 食物检索后必须说明候选、请求用户选择，或生成 meal_log 草稿。
    meal_log.read_recent: 近期用餐读取后必须说明可参考记录、请求补充信息，或生成 meal_log 草稿。
    meal_log.read_by_id: 读取用餐记录后必须总结现有内容、请求补充信息，或生成更新草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或生成/调整 meal_log 草稿。
examples:
- 今晚吃了番茄小炒。
- 记录一餐。
- 给昨天的晚餐补充一下心情和照片。
- 把那顿番茄小炒打 4 分。
- 昨天早餐吃了盒装牛奶和面包。
- 刚才加餐吃了蓝莓酸奶。
