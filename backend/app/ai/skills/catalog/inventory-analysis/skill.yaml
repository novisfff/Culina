version: 3
key: inventory_analysis
display_name: 库存查看与处理
intent: inventory
agent_key: inventory_agent
context_policy:
- inventory
allowed_tools:
- ingredient.search
- ingredient.read_by_id
- ingredient.resolve_candidates
- purchasable.resolve_candidates
- food.search
- food.read_by_id
- shopping.read_pending
- shopping.read_by_id
- inventory.read_summary
- inventory.read_expiring_items
- inventory.read_expired_items
- inventory.read_low_stock_items
- inventory.read_available_items
- human.request_input
- workspace.read_artifact
- inventory.create_intake_draft
- inventory.create_operation_draft
script_files: []
output_types:
- inventory_summary
draft_types:
- inventory_intake
- inventory_operation
draft_contract:
  inventory_intake:
    schema_version: inventory_intake.v1
    approval_config_key: inventory_intake
    commit_handler_key: inventory_intake
  inventory_operation:
    schema_version: inventory_operation.v1
    approval_config_key: inventory_operation
    commit_handler_key: inventory_operation
route_hints:
- inventory
- inventory_analysis
- inventory_summary
- inventory_operation
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 24
  max_same_read_calls: 2
completion_policy:
  terminal_tools:
    inventory.read_summary: 库存概览卡可作为库存查询的终态输出。
    inventory.read_expiring_items: 临期库存卡可作为临期查询的终态输出。
    inventory.read_expired_items: 过期库存卡可作为过期查询的终态输出。
    inventory.read_low_stock_items: 低库存卡可作为补货查询的终态输出。
    inventory.read_available_items: 可用库存卡可作为库存查询的终态输出。
  followup_required_tools:
    ingredient.search: 食材检索后必须说明候选库存处理对象、请求用户选择，或继续读取食材/库存并生成库存处理草稿。
    ingredient.read_by_id: 读取食材档案后必须说明当前库存处理依据、请求补充信息，或生成库存处理草稿。
    ingredient.resolve_candidates: 批量解析后必须把 exact 候选交给后续入库处理，把 missing 逐项进入食材档案 handoff，并对 ambiguous 请求用户选择。
    purchasable.resolve_candidates: 批量解析后必须逐项处理：exact 可继续；candidate 或 ambiguous 必须请求用户选择；missing 必须进入资料 handoff、明确非食品忽略或 skip。所有原始行解决后才可创建 inventory_intake 草稿；不得把 Tool 结果显示为候选卡或视为用户已经确认。
    food.search: 食物检索后必须说明可入库的成品、速食或包装食品候选，请求用户选择，或继续生成入库草稿。
    food.read_by_id: 读取食物资料后必须说明当前库存处理依据、请求补充信息，或生成库存处理草稿。
    shopping.read_pending: 读取待采购清单后必须用于采购关联匹配，或继续请求补充信息/生成统一入库草稿；不得把读取结果当作已确认入库。
    shopping.read_by_id: 读取购物项详情后必须继续匹配、请求补充信息，或生成统一入库草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或继续生成/调整库存处理草稿。
examples:
- 快过期食材有哪些？
- 库存怎么样？
- 还有哪些菜能用的食材？
- 鸡蛋入库 12 个，冷藏。
- 做饭用了 2 个番茄，帮我扣库存。
- 把过期的牛奶销毁掉。
- 看这张冰箱照片，整理成可以确认的入库草稿。
- 按这张小票整理食材，先让我核对再入库。
- 朋友送了 1 份卤牛肉，帮我直接入库。
- 鸡蛋已经买到了，帮我标记完成。
- 这些都买到了，先让我选一个完成并入库。
- 这些都买到了，按小票一起入库。
- 牛奶实际只买了 1 盒，剩下 1 盒继续待买。
routing:
  modes: [query, restock, consume, dispose]
  include_examples:
  - 快过期食材有哪些？
  - 库存怎么样？
  - 还有哪些菜能用的食材？
  - 鸡蛋入库 12 个，冷藏。
  - 做饭用了 2 个番茄，帮我扣库存。
  - 把过期的牛奶销毁掉。
  - 看这张冰箱照片，整理成可以确认的入库草稿。
  - 按这张小票整理食材，先让我核对再入库。
  - 朋友送了 1 份卤牛肉，帮我直接入库。
  - 鸡蛋已经买到了，帮我标记完成。
  - 这些都买到了，先让我选一个完成并入库。
  - 这些都买到了，按小票一起入库。
  - 牛奶实际只买了 1 盒，剩下 1 盒继续待买。
  exclude_examples:
  - 新增鸡蛋食材档案。
  - 新增盒装牛奶食物资料并记录剩余数量。
  - 把低库存食材加入购物清单。
  - 牛奶计划买 2 盒，先改成只买 1 盒。
  conflict_rules:
  - with: ingredient_profile
    when: 用户要管理食材定义、单位换算或低库存规则而非库存批次
    route_to: ingredient_profile
  - with: food_profile
    when: 用户操作成品、速食或包装食品自身的库存字段
    route_to: food_profile
  - with: shopping_list
    when: 用户要标记买到了、完成并入库、按小票入库或部分采购（实际只买了/剩下继续待买）
    route_to: inventory_analysis
handoffs:
  missing_ingredient:
    target_skill: ingredient_profile
    required_draft_type: ingredient_profile
    resume_skill: inventory_analysis
    state_schema: inventory_missing_ingredient.v1
  save_unit_conversion:
    target_skill: ingredient_profile
    required_draft_type: ingredient_profile
    resume_skill: inventory_analysis
    state_schema: inventory_unit_conversion.v1
  missing_intake_target:
    target_skill: ingredient_profile
    required_draft_type: ingredient_profile
    resume_skill: inventory_analysis
    state_schema: inventory_intake_missing_target.v1
  missing_intake_food_target:
    target_skill: food_profile
    required_draft_type: food_profile
    resume_skill: inventory_analysis
    state_schema: inventory_intake_missing_target.v1
attachment_policy:
  accepted_kinds: []
  usages: []
  bindable_fields: []
  current_message_only: true
  explicit_user_intent_required: true
