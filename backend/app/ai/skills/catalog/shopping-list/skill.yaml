version: 2
key: shopping_list
display_name: 购物清单整理
intent: shopping
agent_key: shopping_agent
context_policy:
- shopping
- inventory
- ingredients
- artifacts
allowed_tools:
- human.request_input
- workspace.read_artifact
- ingredient.search
- ingredient.read_by_id
- food.search
- food.read_by_id
- shopping.read_pending
- shopping.read_by_id
- inventory.read_available_items
- shopping.create_draft
script_files: []
output_types: []
draft_types:
- shopping_list
draft_contract:
  shopping_list:
    schema_version: shopping_list.v1
    approval_config_key: shopping_list
    commit_handler_key: shopping_list
route_hints:
- shopping
- shopping_list
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 24
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    ingredient.search: 食材检索后必须说明候选、请求用户选择，或生成 shopping_list 草稿。
    ingredient.read_by_id: 读取食材档案后必须说明如何加入清单、请求补充信息，或生成 shopping_list 草稿。
    food.search: 食物检索后必须说明可采购的成品、速食或包装食品候选，请求用户选择，或生成 shopping_list 草稿。
    food.read_by_id: 读取食物资料后必须确认它属于 readyMade、instant 或 packaged，再说明如何加入清单、请求补充信息，或生成 shopping_list 草稿。
    shopping.read_pending: 待读购物清单读取后必须总结待购重点、请求补充信息，或生成 shopping_list 草稿。
    shopping.read_by_id: 读取购物清单详情后必须说明可调整项、请求补充信息，或生成 shopping_list 草稿。
    inventory.read_available_items: 可用库存读取后必须说明缺口/不必购买项、请求补充信息，或生成 shopping_list 草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或生成/调整 shopping_list 草稿。
examples:
- 生成购物清单。
- 基于这个计划生成采购清单。
- 把牛奶加入购物清单，买 2 盒。
- 鸡蛋已经买到了，帮我标记完成。
- 删除购物清单里的香菜。
- 看看低库存还需要买什么。
