version: 3
key: shopping_list
display_name: 购物清单整理
intent: shopping
agent_key: shopping_agent
context_policy:
- shopping
- inventory
- ingredients
- artifacts
allowed_tools:
- human.request_input
- workspace.read_artifact
- ingredient.search
- ingredient.read_by_id
- food.search
- food.read_by_id
- purchasable.resolve_candidates
- shopping.read_pending
- shopping.read_by_id
- shopping.preview_intake_candidates
- inventory.read_low_stock_items
- inventory.read_available_items
- shopping.create_draft
script_files: []
output_types: []
draft_types:
- shopping_list
draft_contract:
  shopping_list:
    schema_version: shopping_list.v1
    approval_config_key: shopping_list
    commit_handler_key: shopping_list
route_hints:
- shopping
- shopping_list
approval_policy: draft_then_confirm
tool_budget:
  max_tool_calls: 24
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    ingredient.search: 食材检索后必须说明候选、请求用户选择，或生成 shopping_list 草稿。
    ingredient.read_by_id: 读取食材档案后必须说明如何加入清单、请求补充信息，或生成 shopping_list 草稿。
    food.search: 食物检索后必须说明可采购的成品、速食或包装食品候选，请求用户选择，或生成 shopping_list 草稿。
    food.read_by_id: 读取食物资料后必须确认它属于 readyMade、instant 或 packaged，再说明如何加入清单、请求补充信息，或生成 shopping_list 草稿。
    purchasable.resolve_candidates: 批量解析后必须对 ambiguous 请求用户选择，对 missing 进入对应资料 handoff，再继续 shopping_list 草稿。
    shopping.read_pending: 购物清单读取后必须按 pending/completed/all 状态说明结果、请求补充信息，或生成 shopping_list 草稿；恢复待买必须先读取 completed 项。
    shopping.read_by_id: 读取购物清单详情后必须说明可调整项、请求补充信息，或生成 shopping_list 草稿。
    shopping.preview_intake_candidates: 匹配采购行后必须说明 confirmed/suggested/ambiguous/unmatched 结果；歧义项请求选择，未匹配项作为额外购买候选给出建档或单独入库建议；正式入库请交给 inventory_analysis 生成 inventory_intake 草稿。
    inventory.read_low_stock_items: 低库存读取后必须说明完整补货缺口、结合待买项去重、请求用户选择，或生成 shopping_list 草稿。
    inventory.read_available_items: 可用库存读取后必须说明缺口/不必购买项、请求补充信息，或生成 shopping_list 草稿。
    workspace.read_artifact: 读取历史 artifact 后必须说明可复用内容、请求补充信息，或生成/调整 shopping_list 草稿。
examples:
- 生成购物清单。
- 基于这个计划生成采购清单。
- 把牛奶加入购物清单，买 2 盒。
- 鸡蛋已经买到了，帮我标记完成。
- 删除购物清单里的香菜。
- 把前几天买到的盒装牛奶恢复成待买。
- 看看低库存还需要买什么。
- 这些都买到了，先让我选一个完成并入库。
- 这些都买到了，按小票一起入库。
- 牛奶实际只买了 1 盒，剩下 1 盒继续待买。
routing:
  modes: [query, create, update]
  include_examples:
  - 生成购物清单。
  - 基于这个计划生成采购清单。
  - 把牛奶加入购物清单，买 2 盒。
  - 鸡蛋已经买到了，帮我标记完成。
  - 删除购物清单里的香菜。
  - 把前几天买到的盒装牛奶恢复成待买。
  - 看看低库存还需要买什么。
  - 这些都买到了，按小票一起入库。
  exclude_examples:
  - 鸡蛋入库 12 个，冷藏。
  - 新增鸡蛋食材档案。
  - 安排明天晚餐。
  conflict_rules:
  - with: inventory_analysis
    when: 用户只处理已有库存批次，且不涉及完成待买项
    route_to: inventory_analysis
  - with: ingredient_profile
    when: 用户只要创建或修改食材定义
    route_to: ingredient_profile
handoffs:
  shopping_completed_ingredient:
    target_skill: inventory_analysis
    required_draft_type: inventory_operation
    resume_skill: inventory_analysis
    state_schema: shopping_to_stock.v1
  shopping_completed_food:
    target_skill: food_profile
    required_draft_type: food_profile
    resume_skill: food_profile
    state_schema: shopping_to_stock.v1
  missing_ingredient:
    target_skill: ingredient_profile
    required_draft_type: ingredient_profile
    resume_skill: shopping_list
    state_schema: shopping_missing_target.v1
  missing_ready_food:
    target_skill: food_profile
    required_draft_type: food_profile
    resume_skill: shopping_list
    state_schema: shopping_missing_target.v1
attachment_policy:
  accepted_kinds: []
  usages: []
  bindable_fields: []
  current_message_only: true
  explicit_user_intent_required: true
