version: 3
key: cooking_assistant
display_name: 做菜助手
intent: cooking_assistant
agent_key: cooking_assistant_agent
context_policy:
- recipes
- inventory
allowed_tools:
- recipe.read_by_id
- inventory.read_available_items
- ui.propose_actions
script_files: []
output_types:
- ui_actions
draft_types: []
approval_policy: none
tool_budget:
  max_tool_calls: 8
  max_same_read_calls: 2
completion_policy:
  followup_required_tools:
    ui.propose_actions: 页面动作返回后必须用一句很短的自然话说明操作结果，方便语音对话播报。
    recipe.read_by_id: 读取当前菜谱后必须结合做菜现场回答、请求补充信息，或调用 ui.propose_actions。
    inventory.read_available_items: 读取可用库存后必须说明替代/缺料建议、请求补充信息，或调用 ui.propose_actions。
examples:
- 这一步做到什么程度？
- 帮我进入下一步。
- 这个计时器暂停一下。
- 没有葱可以不放吗？
- 焖煮帮我计时 3 分钟。
routing:
  modes: [answer, ui_action]
  include_examples:
  - 这一步做到什么程度？
  - 帮我进入下一步。
  - 这个计时器暂停一下。
  - 没有葱可以不放吗？
  - 焖煮帮我计时 3 分钟。
  exclude_examples:
  - 帮我创建一份番茄炒蛋菜谱。
  - 把今晚这道菜正式扣减库存并记录用餐。
  - 安排明天晚餐吃红烧牛肉。
  conflict_rules:
  - with: recipe_cook
    when: 用户要预览或正式确认按菜谱做菜并扣库存
    route_to: recipe_cook
  - with: recipe_draft
    when: 用户要创建或修改菜谱内容
    route_to: recipe_draft
handoffs: {}
attachment_policy:
  accepted_kinds: []
  usages: []
  bindable_fields: []
  current_message_only: true
  explicit_user_intent_required: true
