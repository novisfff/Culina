version: 2
key: cooking_assistant
display_name: 做菜助手
intent: cooking_assistant
agent_key: cooking_assistant_agent
context_policy:
- recipes
- inventory
allowed_tools:
- recipe.read_by_id
- inventory.read_available_items
- ui.propose_actions
script_files: []
output_types:
- ui_actions
draft_types: []
approval_policy: none
examples:
